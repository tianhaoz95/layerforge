name: Deploy to Firebase

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build apps
        run: pnpm --filter @layerforge/home --filter @layerforge/preview --filter @layerforge/study --filter @layerforge/admin build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}

      - name: Build functions
        run: pnpm --filter @layerforge/functions build

      # Upload each dist separately so download-artifact restores to the exact path
      - uses: actions/upload-artifact@v4
        with:
          name: dist-admin
          path: apps/admin/dist
          retention-days: 1

      - uses: actions/upload-artifact@v4
        with:
          name: dist-home
          path: apps/home/dist
          retention-days: 1

      - uses: actions/upload-artifact@v4
        with:
          name: dist-preview
          path: apps/preview/dist
          retention-days: 1

      - uses: actions/upload-artifact@v4
        with:
          name: dist-study
          path: apps/study/dist
          retention-days: 1

      - uses: actions/upload-artifact@v4
        with:
          name: dist-functions
          path: services/functions/lib
          retention-days: 1

  deploy-hosting:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: dist-admin
          path: apps/admin/dist

      - uses: actions/download-artifact@v4
        with:
          name: dist-home
          path: apps/home/dist

      - uses: actions/download-artifact@v4
        with:
          name: dist-preview
          path: apps/preview/dist

      - uses: actions/download-artifact@v4
        with:
          name: dist-study
          path: apps/study/dist

      - name: Deploy admin
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_LAYERFORGE_PLATFORM }}
          projectId: layerforge-platform
          target: layerforge-admin
          channelId: live

      - name: Deploy home
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_LAYERFORGE_PLATFORM }}
          projectId: layerforge-platform
          target: layerforge-platform
          channelId: live

      - name: Deploy preview
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_LAYERFORGE_PLATFORM }}
          projectId: layerforge-platform
          target: layerforge-preview
          channelId: live

      - name: Deploy study
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_LAYERFORGE_PLATFORM }}
          projectId: layerforge-platform
          target: layerforge-study
          channelId: live

  deploy-functions:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - uses: actions/download-artifact@v4
        with:
          name: dist-functions
          path: services/functions/lib

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_LAYERFORGE_PLATFORM }}

      - name: Deploy Firestore rules
        run: npx firebase-tools deploy --only firestore --project layerforge-platform --force

      - name: Deploy functions
        run: npx firebase-tools deploy --only functions --project layerforge-platform --force
