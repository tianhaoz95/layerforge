name: Deploy Sandbox to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - services/sandbox/**
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_LAYERFORGE_PLATFORM }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: services/sandbox
          push: true
          tags: us-central1-docker.pkg.dev/layerforge-platform/layerforge/sandbox:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Delete old image digests
        run: |
          OLD=$(gcloud artifacts docker images list \
            us-central1-docker.pkg.dev/layerforge-platform/layerforge/sandbox \
            --include-tags --sort-by="~createTime" \
            --format="value(digest)" | tail -n +2)
          for digest in $OLD; do
            gcloud artifacts docker images delete \
              "us-central1-docker.pkg.dev/layerforge-platform/layerforge/sandbox@$digest" \
              --delete-tags --quiet && echo "Deleted $digest" || true
          done

      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: sandbox
          region: us-central1
          image: us-central1-docker.pkg.dev/layerforge-platform/layerforge/sandbox:latest
          flags: >-
            --no-allow-unauthenticated
            --memory 2Gi
            --cpu 1
            --min-instances 0
            --max-instances 3
            --concurrency 1
            --timeout 30s

      - name: Grant Cloud Functions invoker access
        run: |
          gcloud run services add-iam-policy-binding sandbox \
            --region=us-central1 \
            --member="serviceAccount:604075361442-compute@developer.gserviceaccount.com" \
            --role="roles/run.invoker" \
            --quiet

      - name: Print service URL
        run: echo "Sandbox deployed to ${{ steps.deploy.outputs.url }}"
